# AVM 本地开发数据库
# 仅启动 PostgreSQL，供本地 npm run dev 使用
# 启动: docker compose -f docker-compose.dev.yml up -d
# 停止: docker compose -f docker-compose.dev.yml down

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: avm-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: avm
      POSTGRES_DB: avm
      POSTGRES_PASSWORD: avm_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U avm"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  postgres-dev-data:
    driver: local
